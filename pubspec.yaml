name: bangla_vocabulary
description: "Learn English vocabulary daily with Bangla meanings and pronunciation."
publish_to: 'none'

version: 1.0.1+4

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_tts: ^4.2.5
  google_mobile_ads: ^9.0.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  # Use freezed 2.4.x which is compatible with isar_generator's analyzer constraint
  freezed: ^2.4.8
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/bp_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/data/vocabulary.json
    - assets/logo/
